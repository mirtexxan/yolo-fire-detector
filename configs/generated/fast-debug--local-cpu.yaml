project:
  label: fast-debug
  persistent_root: artifacts/local
dataset:
  label: synthetic-fire-fast-debug
  fire_image_paths:
  - base_fire_images/fire.png
  num_images: 400
  image_size: 512
  negative_ratio: 0.35
  train_split: 0.8
  seed: 42
  force_regenerate: true
training:
  label: yolov8n-fast-debug
  model_size: n
  weights: yolov8n.pt
  epochs: 2
  batch_size: 16
  image_size: 512
  resume: never
  device: cpu
  require_gpu: false
dataset_settings_overrides:
  fire_scale_min: 0.07
  fire_scale_max: 0.4
image_transform_overrides:
  rotation_deg_min: -90
  rotation_deg_max: 90
  perspective_shift: 40
  motion_blur_prob: 0.1
  gaussian_blur_prob: 0.05
  noise_prob: 0.05
  shadow_prob: 0.15
  occlusion_prob: 0.1
  augment_negative_backgrounds: false
training_overrides:
  patience: 5
  learning_rate_init: 0.01
  learning_rate_final: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  rotation_degrees: 10
  translate: 0.1
  scale: 0.35
  flip_vertical: 0.5
  flip_horizontal: 0.5
  mosaic: 0.5
  mixed_precision: true
  overwrite_existing: true
  verbose: true
