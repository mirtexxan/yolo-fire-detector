project:
  label: recall-focus

dataset:
  label: synthetic-fire-recall
  fire_image_paths:
    - base_fire_images/fire.png
  num_images: 4000
  image_size: 640
  negative_ratio: 0.2
  train_split: 0.8
  seed: 52
  force_regenerate: false

training:
  label: yolov8s-recall
  model_size: s
  weights: yolov8s.pt
  epochs: 80
  batch_size: 16
  image_size: 640
  resume: auto

dataset_settings_overrides:
  fire_scale_min: 0.03
  fire_scale_max: 0.6

image_transform_overrides:
  rotation_deg_min: -120
  rotation_deg_max: 120
  perspective_shift: 140
  enable_color_shift: true
  color_shift_prob: 0.5
  augment_negative_backgrounds: true

training_overrides:
  patience: 20
  learning_rate_init: 0.005
  learning_rate_final: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  rotation_degrees: 10
  translate: 0.08
  scale: 0.4
  flip_vertical: 0.5
  flip_horizontal: 0.5
  mosaic: 0.5
  mixed_precision: true
  overwrite_existing: true
  verbose: true