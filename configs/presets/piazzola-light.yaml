project:
  label: piazzola-light

dataset:
  label: piazzola-light-dataset
  fire_image_paths:
    - base_fire_images/piazzola_nobg.png
  num_images: 1000
  image_size: 512
  negative_ratio: 0.35
  train_split: 0.8
  seed: 42
  force_regenerate: false

training:
  label: yolov8n-piazzola-light
  model_size: n
  weights: yolov8n.pt
  device: cpu
  epochs: 15
  batch_size: 8
  image_size: 512
  resume: auto

dataset_settings_overrides:
  fire_scale_min: 0.08
  fire_scale_max: 0.38

image_transform_overrides:
  rotation_deg_min: -45
  rotation_deg_max: 45
  perspective_shift: 50
  motion_blur_prob: 0.1
  gaussian_blur_prob: 0.08
  noise_prob: 0.08
  shadow_prob: 0.2
  occlusion_prob: 0.15
  augment_negative_backgrounds: true

training_overrides:
  patience: 5
  learning_rate_init: 0.01
  learning_rate_final: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  rotation_degrees: 8
  translate: 0.08
  scale: 0.35
  flip_vertical: 0.2
  flip_horizontal: 0.5
  mosaic: 0.3
  mixed_precision: false
  overwrite_existing: true
  verbose: true