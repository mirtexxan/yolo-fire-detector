project:
  label: small-fire-focus

dataset:
  label: synthetic-fire-small-fire
  fire_image_paths:
    - base_fire_images/fire.png
  num_images: 3500
  image_size: 832
  negative_ratio: 0.3
  train_split: 0.8
  seed: 72
  force_regenerate: false

training:
  label: yolov8s-small-fire
  model_size: s
  weights: yolov8s.pt
  epochs: 80
  batch_size: 8
  image_size: 832
  resume: auto

dataset_settings_overrides:
  fire_scale_min: 0.02
  fire_scale_max: 0.35

image_transform_overrides:
  rotation_deg_min: -120
  rotation_deg_max: 120
  perspective_shift: 120
  enable_color_shift: true
  color_shift_prob: 0.4
  augment_negative_backgrounds: true

training_overrides:
  patience: 18
  learning_rate_init: 0.004
  learning_rate_final: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  rotation_degrees: 8
  translate: 0.08
  scale: 0.35
  flip_vertical: 0.5
  flip_horizontal: 0.5
  mosaic: 0.4
  mixed_precision: true
  overwrite_existing: true
  verbose: true