project:
  label: balanced-mini-fires

dataset:
  label: synthetic-fire-balanced
  fire_image_paths:
    - base_fire_images/fire1-mini_nobg.png
    - base_fire_images/fire2-mini_nobg.png
  num_images: 2400
  image_size: 640
  negative_ratio: 0.3
  train_split: 0.8
  seed: 44
  force_regenerate: false

training:
  label: yolov8n-mini-balanced
  model_size: n
  weights: yolov8n.pt
  epochs: 45
  batch_size: 16
  image_size: 640
  resume: auto

dataset_settings_overrides:
  fire_scale_min: 0.04
  fire_scale_max: 0.52

image_transform_overrides:
  rotation_deg_min: -160
  rotation_deg_max: 160
  perspective_shift: 130
  enable_color_shift: true
  color_shift_prob: 0.45
  motion_blur_prob: 0.35
  gaussian_blur_prob: 0.25
  noise_prob: 0.25
  shadow_prob: 0.55
  occlusion_prob: 0.35
  augment_negative_backgrounds: true

training_overrides:
  patience: 12
  learning_rate_init: 0.008
  learning_rate_final: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  rotation_degrees: 12
  translate: 0.1
  scale: 0.45
  flip_vertical: 0.4
  flip_horizontal: 0.5
  mosaic: 0.8
  mixed_precision: true
  overwrite_existing: true
  verbose: true