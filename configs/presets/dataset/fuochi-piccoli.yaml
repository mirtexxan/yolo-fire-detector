# Dataset preset: fuochi piccoli e lontani — il caso piu' difficile da rilevare.
# Scale ridotte (2-18%), augmentazioni di sfocatura e rumore accentuate.
# Usare insieme a un preset training con alta recall.
# Non include le immagini di base (selezionate nel configuratore).
dataset:
  num_images: 3000
  image_size: 640
  negative_ratio: 0.3
  train_split: 0.8
  seed: 77
  force_regenerate: false

dataset_settings_overrides:
  fire_scale_min: 0.02
  fire_scale_max: 0.18

image_transform_overrides:
  rotation_deg_min: -180
  rotation_deg_max: 180
  perspective_shift: 100
  enable_color_shift: true
  color_shift_prob: 0.4
  motion_blur_prob: 0.45
  gaussian_blur_prob: 0.35
  noise_prob: 0.4
  shadow_prob: 0.45
  occlusion_prob: 0.5
  augment_negative_backgrounds: true
