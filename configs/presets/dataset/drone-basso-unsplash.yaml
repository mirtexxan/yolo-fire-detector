description:
  title: Drone basso + sfondi Unsplash (precision-first)
  summary: Volo 2-8m con sfondi Unsplash di terreno/contesto; riduce falsi positivi
    mantenendo copertura a quota bassa.
  use_when: Puoi usare solo domini Unsplash locali (warehouse/industrial/forest),
    senza dataset reale raccolto a mano.
  tradeoff: Robusto nel perimetro Unsplash scelto; meno robusto fuori dominio rispetto
    a hard-negative reali.
dataset:
  num_images: 3600
  image_size: 640
  negative_ratio: 0.8
  train_split: 0.8
  seed: 20260404
  force_regenerate: false
dataset_settings_overrides:
  fire_scale_min: 0.06
  fire_scale_max: 0.35
image_transform_overrides:
  perspective_shift: 30
  brightness_beta_min: -35
  brightness_beta_max: 35
  contrast_alpha_min: 0.78
  contrast_alpha_max: 1.3
  motion_blur_prob: 0.22
  gaussian_blur_prob: 0.1
  noise_prob: 0.1
  shadow_prob: 0.12
  occlusion_prob: 0.05
  augment_negative_backgrounds: true
  use_unsplash_backgrounds: true
  unsplash_background_prob: 1.0
  unsplash_background_dirs:
  - artifacts/local/background_domains/unsplash/warehouse
  - artifacts/local/background_domains/unsplash/industrial
  - artifacts/local/background_domains/unsplash/forest
