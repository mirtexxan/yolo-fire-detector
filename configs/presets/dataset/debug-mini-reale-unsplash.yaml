description:
  title: Debug mini reale Unsplash
  summary: Dataset piccolo con sfondi reali Unsplash locali per testare anche il ramo
    real-background.
  use_when: Smoke test rapido del flusso con sfondi reali (senza aspettare training
    lungo).
  tradeoff: Copertura limitata; non usare per valutazioni finali.
dataset:
  num_images: 80
  image_size: 384
  negative_ratio: 0.75
  train_split: 0.8
  seed: 20260404
  force_regenerate: true
dataset_settings_overrides:
  fire_scale_min: 0.05
  fire_scale_max: 0.3
image_transform_overrides:
  perspective_shift: 20
  brightness_beta_min: -20
  brightness_beta_max: 20
  contrast_alpha_min: 0.85
  contrast_alpha_max: 1.2
  motion_blur_prob: 0.1
  gaussian_blur_prob: 0.05
  noise_prob: 0.08
  shadow_prob: 0.05
  occlusion_prob: 0.03
  augment_negative_backgrounds: true
  use_unsplash_backgrounds: true
  unsplash_background_prob: 0.8
  unsplash_background_dirs:
  - artifacts/local/background_domains/unsplash/forest
  - artifacts/local/background_domains/unsplash/industrial
