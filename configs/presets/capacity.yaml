project:
  label: higher-capacity

dataset:
  label: synthetic-fire-capacity
  fire_image_paths:
    - base_fire_images/fire.png
  num_images: 4500
  image_size: 736
  negative_ratio: 0.3
  train_split: 0.8
  seed: 92
  force_regenerate: false

training:
  label: yolov8m-capacity
  model_size: m
  weights: yolov8m.pt
  epochs: 100
  batch_size: 8
  image_size: 736
  resume: auto

dataset_settings_overrides:
  fire_scale_min: 0.04
  fire_scale_max: 0.55

image_transform_overrides:
  rotation_deg_min: -140
  rotation_deg_max: 140
  perspective_shift: 140
  enable_color_shift: true
  color_shift_prob: 0.45
  augment_negative_backgrounds: true

training_overrides:
  patience: 24
  learning_rate_init: 0.003
  learning_rate_final: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  rotation_degrees: 10
  translate: 0.08
  scale: 0.4
  flip_vertical: 0.5
  flip_horizontal: 0.5
  mosaic: 0.4
  mixed_precision: true
  overwrite_existing: true
  verbose: true