project:
  label: robustness-focus

dataset:
  label: synthetic-fire-robust
  fire_image_paths:
    - base_fire_images/fire.png
  num_images: 5000
  image_size: 640
  negative_ratio: 0.35
  train_split: 0.8
  seed: 62
  force_regenerate: false

training:
  label: yolov8s-robust
  model_size: s
  weights: yolov8s.pt
  epochs: 90
  batch_size: 16
  image_size: 640
  resume: auto

dataset_settings_overrides:
  fire_scale_min: 0.04
  fire_scale_max: 0.55

image_transform_overrides:
  rotation_deg_min: -180
  rotation_deg_max: 180
  perspective_shift: 180
  enable_color_shift: true
  color_shift_prob: 0.6
  motion_blur_prob: 0.55
  gaussian_blur_prob: 0.35
  noise_prob: 0.35
  shadow_prob: 0.65
  occlusion_prob: 0.45
  augment_negative_backgrounds: true

training_overrides:
  patience: 20
  learning_rate_init: 0.005
  learning_rate_final: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  rotation_degrees: 12
  translate: 0.1
  scale: 0.45
  flip_vertical: 0.5
  flip_horizontal: 0.5
  mosaic: 0.7
  mixed_precision: true
  overwrite_existing: true
  verbose: true