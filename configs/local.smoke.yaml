project:
  environment: local
  label: smoke-test
  persistent_root: artifacts/local

dataset:
  label: smoke-dataset
  fire_image_paths:
    - base_fire_images/fire.png
  # In alternativa puoi specificare esplicitamente un sottoinsieme:
  # fire_image_paths:
  #   - base_fire_images/fire2.png
  #   - base_fire_images/fire.png
  num_images: 12
  image_size: 320
  negative_ratio: 0.35
  train_split: 0.8
  seed: 7
  force_regenerate: true

training:
  label: yolov8n-smoke
  model_size: n
  weights: yolov8n.pt
  device: cpu
  epochs: 1
  batch_size: 4
  image_size: 320
  resume: never

training_overrides:
  patience: 2
  mixed_precision: false
  overwrite_existing: true
  verbose: false
  mosaic: 0.0
  flip_vertical: 0.0
  flip_horizontal: 0.0
