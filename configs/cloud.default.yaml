project:
  environment: cloud
  label: drive-persistent
  persistent_root: /content/drive/MyDrive/yolo-fire-detector

dataset:
  label: synthetic-fire-cloud
  fire_image_paths:
    - base_fire_images/fire.png
  # Per usare piu' immagini base scelte da te:
  # fire_image_paths:
  #   - base_fire_images/fire2.png
  #   - base_fire_images/fire.png
  num_images: 2000
  image_size: 640
  negative_ratio: 0.35
  train_split: 0.8
  seed: 42
  force_regenerate: false

training:
  label: yolov8n-cloud
  model_size: n
  weights: yolov8n.pt
  device: "0"
  epochs: 50
  batch_size: 16
  image_size: 640
  resume: auto

dataset_settings_overrides:
  fire_scale_min: 0.05
  fire_scale_max: 0.5

image_transform_overrides:
  rotation_deg_min: -180
  rotation_deg_max: 180
  perspective_shift: 120
  augment_negative_backgrounds: true

training_overrides:
  patience: 10
  learning_rate_init: 0.01
  learning_rate_final: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  rotation_degrees: 15
  translate: 0.1
  scale: 0.5
  flip_vertical: 0.5
  flip_horizontal: 0.5
  mosaic: 1.0
  mixed_precision: true
  overwrite_existing: true
  verbose: true
